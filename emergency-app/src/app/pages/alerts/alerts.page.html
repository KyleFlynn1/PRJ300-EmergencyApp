<ion-header [translucent]="false" class="app-header">
  <div class="header-spacer"></div>
  <div class="header-row">
    <h1>All Alerts</h1>
  </div>
</ion-header>

<ion-content >
  <!-- Pull to refresh page-->
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-circle-outline"
      pullingText="Pull to refresh"
      refreshingSpinner="crescent"
      refreshingText="Refreshing...">
    </ion-refresher-content>
  </ion-refresher>
  <div class="section">
    <!--Search bar with time filter-->
    <div class="search-row">
      <div class="search-container">
        <ion-icon name="search-outline"></ion-icon>
        <input 
          type="search" 
          class="native-select" 
          placeholder="Search for Alert"
          [value]="searchTerm"
          (input)="onSearchChange($event)" />
      </div>
      <div class="time-filter-container">
        <select [(ngModel)]="selectedTimeFilter" (change)="applyFilters()" class="styled-type-select">
          <option value="all">All</option>
          <option value="24h">24 Hours</option>
          <option value="48h">48 Hours</option>
          <option value="72h">72 Hours</option>
          <option value="7d">7 Days</option>
        </select>
      </div>
    </div>
    
    <!--Filter Buttons-->
    <div class="filter-buttons" style="display:flex;justify-content:center;gap:8px;margin:12px 0;">
      <button class="filter-button filter-all ion-activatable" [class.selected]="selectedSeverityFilter === 'all'" (click)="onFilterChange('all')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="alert-circle-outline"></ion-icon></button>
      <button class="filter-button filter-info ion-activatable" [class.selected]="selectedSeverityFilter === 'info'" (click)="onFilterChange('info')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="information-circle-outline"></ion-icon></button>
      <button class="filter-button filter-low ion-activatable" [class.selected]="selectedSeverityFilter === 'low'" (click)="onFilterChange('low')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="checkmark-circle-outline"></ion-icon></button>
      <button class="filter-button filter-moderate ion-activatable" [class.selected]="selectedSeverityFilter === 'moderate'" (click)="onFilterChange('moderate')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="alert-circle-outline"></ion-icon></button>
      <button class="filter-button filter-high ion-activatable" [class.selected]="selectedSeverityFilter === 'high'" (click)="onFilterChange('high')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="warning-outline"></ion-icon></button>
      <button class="filter-button filter-urgent ion-activatable" [class.selected]="selectedSeverityFilter === 'urgent'" (click)="onFilterChange('urgent')"><ion-ripple-effect></ion-ripple-effect><ion-icon name="alarm-outline"></ion-icon></button>
    </div>

    <!-- Alerts list -->
    <div class="scroll-shadow-wrapper" [class.scrolled]="isListScrolled">
    <div class="alerts-list feed-list" (scroll)="onScroll($event)">
      <!-- Skeleton loading cards -->
      <ng-container *ngIf="isLoading">
        <div class="native-feed-card skeleton-card" *ngFor="let s of [1,2,3,4,5]">
          <div class="card-inner">
            <ion-skeleton-text animated class="skeleton-icon"></ion-skeleton-text>
            <div class="card-content" style="flex:1">
              <ion-skeleton-text animated style="width:50%;height:14px;border-radius:6px;margin-bottom:8px"></ion-skeleton-text>
              <ion-skeleton-text animated style="width:85%;height:11px;border-radius:6px;margin-bottom:6px"></ion-skeleton-text>
              <ion-skeleton-text animated style="width:65%;height:10px;border-radius:6px"></ion-skeleton-text>
            </div>
          </div>
        </div>
      </ng-container>

      <!-- No alerts message -->
      <div *ngIf="!isLoading && alerts.length === 0" class="no-alerts-message">
        <ion-icon name="information-circle-outline"></ion-icon>
        <span>No alerts found</span>
      </div>
      
      <!-- Alerts cards -->
      <div 
        *ngFor="let alert of alerts; let i = index"
        class="native-feed-card ion-activatable"
        (click)="openAlertDetailModal(alert)"
        [ngStyle]="{ 'borderColor': getAlertSeverityColor(alert.severity) }">
        <ion-ripple-effect></ion-ripple-effect>
        <div class="card-inner">
          <ion-icon [name]="getIcon(alert.category)" [style.background]="getAlertSeverityColor(alert.severity)" class="card-icon"></ion-icon>
          <div class="card-content">
            <div class="card-header">
              <h3>{{ alert.category }}</h3>
              <span class="severity-badge">{{ alert.severity }}</span>
            </div>
            <div class="description-text">
              <p>{{ alert.notes ? (alert.notes | slice:0:80) : 'No description' }}<span *ngIf="alert.notes && alert.notes.length > 80">...</span></p>
            </div>
            <p class="detail-text">
              <span class="detail-icon">
                <ion-icon name="location-outline"></ion-icon>
                {{ getDistanceString(alert) }}
              </span>
              <span class="detail-icon">
                <ion-icon name="time-outline"></ion-icon>
                {{ getFormattedTimestamp(alert.timestamp) }}
              </span>
            </p>
          </div>
        </div>
      </div>
    </div>
    </div> <!-- end scroll-shadow-wrapper -->
  </div>
  </ion-content>

  <!-- Alert Detail Modal (native overlay) -->
  <div class="native-modal-overlay" *ngIf="showAlertDetailModal">
    <div class="native-modal-content" [style.border-left]="'6px solid ' + getAlertSeverityColor(selectedAlert?.severity)">
      <div class="modal-header">
        <button class="close-button" (click)="closeAlertDetailModal()">
          <ion-icon name="close"></ion-icon>
        </button>
      </div>
      <div class="modal-body">
        <app-alert-detail-modal [alert]="selectedAlert" [isNativeModal]="true"></app-alert-detail-modal>
      </div>
    </div>
  </div>
