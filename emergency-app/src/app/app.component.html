<ion-app>
  <!-- Offline banner -->
  <div class="offline-banner" *ngIf="isOffline">
    <ion-icon name="cloud-offline-outline"></ion-icon>
    No connection right now
  </div>
  
  <!--Bottom Navigation Bar-->
  <ion-content id="main-content" [scrollY]="true">
    <ion-router-outlet></ion-router-outlet>
    <div class="bottom-nav-fixed">
      <button class="nav-btn" routerLink="/home" routerLinkActive="active">
        <ion-icon name="home"></ion-icon>
        <span>Home</span>
      </button>
      <button class="nav-btn" routerLink="/alerts" routerLinkActive="active">
        <ion-icon name="alert-circle-outline"></ion-icon>
        <span>Alerts</span>
      </button>
      <button class="nav-btn" routerLink="/map" routerLinkActive="active">
        <ion-icon name="map-outline"></ion-icon>
        <span>Map</span>
      </button>
      <button class="nav-btn" routerLink="/defibilators" routerLinkActive="active">
        <ion-icon name="heart-outline"></ion-icon>
        <span>Defibs</span>
      </button>
      <button class="nav-btn" routerLink="/settings" routerLinkActive="active">
        <ion-icon name="settings-outline"></ion-icon>
        <span>Settings</span>
      </button>
    </div>
  </ion-content>
</ion-app>
